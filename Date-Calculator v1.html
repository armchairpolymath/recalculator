window.App = {
  switchView:function(v){
    _calView=v;
    ['detail','calendar','timeline','help'].forEach(function(id){
      document.getElementById('pane'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active',v===id);
      document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active',v===id);
    });
    if(v==='calendar') _renderCalendar(calc());
    if(v==='timeline') _renderTimelineView(calc());
    if(v==='help') _renderHelp();
  },
  setMode:function(m){
    S.mode=m; S.overrides={}; S.dayOverrides={}; S.edTrigger='acceptance';
    S.ddrAnchor='ddObjection';
    delete S._icActualManualSkip; delete S._icActualManualShow;
    // Per-mode defaults for Loan, New Survey, and individual field skips
    if(m==='40day'){
      S.ignored={icActual:true};
      S.includeLoan=false; S.ignoredSections={newsurvey:true};
    } else if(m==='45day'){
      S.ignored={icActual:true,proofOfFunds:true};
      S.includeLoan=true; S.ignoredSections={newsurvey:true};
    } else if(m==='60day'){
      S.ignored={icActual:true,proofOfFunds:true};
      S.includeLoan=true; S.ignoredSections={};
    } else {
      S.ignored={icActual:true};
      S.includeLoan=true; S.ignoredSections={};
    }
    render();
  },
  setPropertyName:function(v){ S.propertyName=v||''; _renderPrintHeader(calc()); },
  toggleIgnore:function(k,v){
    var on=(v===true||v==='true');
    if(on){ S.ignored[k]=true; }
    else { delete S.ignored[k]; }
    // Track manual override for icActual so auto-logic doesn't fight the user
    if(k==='icActual'){
      var icActualNeeded=(S.edTrigger==='icActual')||(S.ddrAnchor==='icActual');
      if(icActualNeeded&&on) S._icActualManualSkip=true;
      else if(!icActualNeeded&&!on) S._icActualManualShow=true;
      else { delete S._icActualManualSkip; delete S._icActualManualShow; }
    }
    render();
  },
  toggleSectionIgnore:function(id,v){ var on=(v===true||v==='true'); if(on)S.ignoredSections[id]=true; else delete S.ignoredSections[id]; render(); },
  exportCalendar:function(){
    var computed=calc();
    var calName=S.propertyName?S.propertyName+' — RE Transaction Dates':'RE Transaction Dates';
    var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//RE Transaction Date Calculator//EN',
      'CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:'+_icsEsc(calName)];

    // Collect all keys to export: grouped fields + titleCommitment (ungrouped input field)
    var exportKeys=[];
    GROUPS.forEach(function(grp){
      if(S.ignoredSections[grp.id]) return;
      grp.keys.forEach(function(k){ exportKeys.push(k); });
    });
    // Insert titleCommitment after existingSurveyDelivery if not ignored
    if(!S.ignored['titleCommitment'] && !S.ignoredSections['dd']){
      var insertAfter=exportKeys.indexOf('existingSurveyDelivery');
      if(insertAfter>=0) exportKeys.splice(insertAfter+1,0,'titleCommitment');
      else exportKeys.unshift('titleCommitment');
    }

    // These keys are excluded from calendar export (reference fields, not performance deadlines)
    var calExclude={icActual:true, acceptanceDate:true, offerDate:true};

    exportKeys.forEach(function(k){
      if(calExclude[k]) return;
      if(S.ignored[k]) return;
      var fd=FD_MAP[k]; if(!fd) return;
      if(fd.loan&&!S.includeLoan) return;
      var date=computed.dates[k]; if(!date) return;
      // Export the calculated (contract) date — not the effective/rolled date
      var exportDate=date;
      var ds=toYMD(exportDate).replace(/-/g,'');
      var de=toYMD(addDays(exportDate,1)).replace(/-/g,'');
      // Property name leads the summary when set
      var summary=S.propertyName
        ? _icsEsc(S.propertyName+' — '+fd.lbl)
        : _icsEsc(fd.lbl);
      // Build DESCRIPTION: note effective date when date falls on weekend/holiday
      var descParts=[];
      var effDate=computed.effective&&computed.effective[k];
      if(effDate){
        descParts.push('Contract Date: '+fmtDisplay(date));
        descParts.push('Effective (Business) Date: '+fmtDisplay(effDate));
        descParts.push('Note: Contract date falls on a weekend or holiday. Performance under Days language is due on the Effective Date.');
      }
      var description=descParts.length?descParts.join('\\n'):'';
      lines.push('BEGIN:VEVENT');
      lines.push('DTSTART;VALUE=DATE:'+ds);
      lines.push('DTEND;VALUE=DATE:'+de);
      lines.push('SUMMARY:'+summary);
      if(description) lines.push('DESCRIPTION:'+_icsEsc(description));
      lines.push('UID:redatecalc-'+k+'-'+ds+'@redatecalc');
      lines.push('END:VEVENT');
    });
    lines.push('END:VCALENDAR');
    var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download=(S.propertyName||'re-transaction').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'-dates.ics';
    a.click(); URL.revokeObjectURL(url);
  },
  setOfferDate:function(v){ S.offerDate=v||null; render(); },
  setCustomClosing:function(v){ S.customClosing=v||null; render(); },
  setOverride:function(k,v){
    if(v){
      var vr=_validateOverride(k,v);
      if(!vr.ok){
        _ovErrors[k]=vr.msg; render();
        setTimeout(function(){ delete _ovErrors[k]; render(); },4000);
        return;
      }
    }
    delete _ovErrors[k];
    if(v) S.overrides[k]=v; else delete S.overrides[k];
    render();
  },
  resetField:function(k){ delete S.overrides[k]; delete S.dayOverrides[k]; delete _ovErrors[k]; render(); },
  setDayOverride:function(k,v){
    var n=parseInt(v,10);
    if(v===''||v===null||isNaN(n)){ delete S.dayOverrides[k]; render(); return; }
    var fd=FD_MAP[k];
    var isCloseAnchored=fd&&fd.anch==='close';
    if(isCloseAnchored&&n>0){
      _ovErrors[k]='Close-anchored fields must be 0 or negative'; render();
      setTimeout(function(){ delete _ovErrors[k]; render(); },4000); return;
    }
    if(!isCloseAnchored&&n<0){
      _ovErrors[k]='Must be 0 or positive'; render();
      setTimeout(function(){ delete _ovErrors[k]; render(); },4000); return;
    }
    S.dayOverrides[k]=n;
    render();
  },
  setDateFromPicker:function(k,v){
    if(!v){ delete S.dayOverrides[k]; render(); return; }
    var nd=parseYMD(v);
    if(!nd){ render(); return; }
    var computed=calc();
    var fd=FD_MAP[k];
    var anchorDate=null;
    if(fd.anch==='acceptance') anchorDate=computed.dates.acceptanceDate;
    else if(fd.anch==='close') anchorDate=computed.dates.closingDate;
    else if(fd.anch==='offerDate') anchorDate=computed.dates.offerDate;
    else if(fd.anch==='titleReceipt') anchorDate=computed.dates.titleCommitment;
    else if(fd.anch==='ddObjection'){
      anchorDate=(k==='dueDiligenceResolution')?(computed.dates[S.ddrAnchor]||computed.dates.dueDiligenceObjection):computed.dates.dueDiligenceObjection;
    }
    else if(fd.anch==='icTrigger') anchorDate=S.edTrigger==='icActual'?computed.dates.icActual:computed.dates.acceptanceDate;
    if(!anchorDate){ render(); return; }
    var offset=diffDays(anchorDate,nd);
    var isCloseAnchored=fd.anch==='close';
    if(isCloseAnchored&&offset>0){
      _ovErrors[k]='Close-anchored fields must be 0 or negative'; render();
      setTimeout(function(){ delete _ovErrors[k]; render(); },4000); return;
    }
    if(!isCloseAnchored&&offset<0){
      _ovErrors[k]='Must be 0 or positive (date is before anchor)'; render();
      setTimeout(function(){ delete _ovErrors[k]; render(); },4000); return;
    }
    S.dayOverrides[k]=offset;
    render();
  },
  setDdrAnchor:function(v){ S.ddrAnchor=v||'ddObjection'; delete S._icActualManualSkip; delete S._icActualManualShow; render(); },
  setEdTrigger:function(v){ S.edTrigger=v; delete S._icActualManualSkip; delete S._icActualManualShow; render(); },
  openSettings:openSettings,
  closeSettings:closeSettings,
  switchSTab:function(t){ _sTab=t; _renderSettings(); },
  switchPTab:function(t){ _pTab=t; _renderSettings(); },
  deleteHol:function(i){ S.settings.holidays.splice(i,1); clearHolCache(); saveSettings(); _renderSettings(); render(); },
  showAddHolModal:_showAddHolModal,
  printView:function(){
    generatePDF();
  },
  toggleLoanDates:function(){ S.includeLoan=!S.includeLoan; render(); },
  _tlTip:function(e,lbl,date,isGhost){
    var tip=document.getElementById('calTooltip');
    if(!tip) return;
    tip.innerHTML=(isGhost?'<em style="color:#7c3aed;font-size:.7rem">Rollover Date</em><br>':'')+esc(lbl)+'<br><span style="color:#94a3b8;font-size:.72rem">'+esc(date)+'</span>';
    tip.style.display='block';
    tip.style.left=(e.clientX+12)+'px';
    tip.style.top=(e.clientY-8)+'px';
  },
  _tlTipHide:function(){
    var tip=document.getElementById('calTooltip');
    if(tip) tip.style.display='none';
  },
  toggleMoreMenu:function(){
    var m=document.getElementById('moreMenu');
    if(m) m.classList.toggle('open');
  },
  closeMoreMenu:function(){
    var m=document.getElementById('moreMenu');
    if(m) m.classList.remove('open');
  },
  saveToMyPreset:function(){
    var offs=getOffsets();
    // Build a label describing source mode for the confirmation message
    var modeLabel={'40day':'30 Day','45day':'45 Day','60day':'60 Day','user':'My Preset','custom':'Custom'}[S.mode]||S.mode;
    if(!confirm('Save current day offsets ('+modeLabel+' + any overrides) to My Preset?\nThis will overwrite the existing My Preset values.')) return;
    var newPreset=clone(S.settings.presets['user']);
    FD.forEach(function(fd){
      if(!fd.offKey) return; // skip inputOnly and isDefault fields
      // Displayed value: dayOverride if set, else active preset offset, else existing user preset
      var val;
      if(S.dayOverrides[fd.k]!==undefined){
        val=S.dayOverrides[fd.k];
      } else if(offs&&offs[fd.offKey]!==undefined){
        val=offs[fd.offKey];
      } else {
        return; // no value to capture
      }
      newPreset[fd.offKey]=val;
    });
    S.settings.presets['user']=newPreset;
    saveSettings();
    // Clear day overrides since they're now baked into the preset
    S.dayOverrides={};
    // Switch to My Preset mode so the user sees the result
    S.mode='user';
    S.overrides={};
    S.edTrigger='acceptance';
    render();
    // Brief visual feedback
    var btn=document.querySelector('.btn-preset-save-inline');
    if(btn){ var orig=btn.textContent; btn.textContent='✓ Saved!'; setTimeout(function(){ btn.textContent=orig; },1800); }
  },
  updateOff:function(pk,ok,v){ S.settings.presets[pk][ok]=parseInt(v)||0; saveSettings(); render(); },
  resetPreset:function(pk){
    var def=pk==='40day'?DEF40:pk==='45day'?DEF45:pk==='60day'?DEF60:DEF_USER;
    S.settings.presets[pk]=clone(def);
    saveSettings(); _renderSettings(); render();
  },
  exportSettings:function(){
    var data={version:2,holidays:S.settings.holidays,presets:S.settings.presets};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob); var a=document.createElement('a');
    a.href=url; a.download='re-date-calc-settings.json'; a.click(); URL.revokeObjectURL(url);
  },
  importSettings:function(inp){
    var f=inp.files[0]; if(!f)return;
    var r=new FileReader();
    r.onload=function(e){
      try{
        var d=JSON.parse(e.target.result);
        if(!confirm('Import settings? This will overwrite your current holidays and presets.'))return;
        if(d.holidays) S.settings.holidays=d.holidays;
        if(d.presets){
          S.settings.presets['40day']=merge(clone(DEF40),d.presets['40day']||{});
          S.settings.presets['45day']=merge(clone(DEF45),d.presets['45day']||{});
          S.settings.presets['60day']=merge(clone(DEF60),d.presets['60day']||{});
          S.settings.presets['user'] =merge(clone(DEF_USER),d.presets['user']||{});
        }
        clearHolCache(); saveSettings(); _renderSettings(); render();
      }catch(err){ alert('Import failed: '+err.message); }
      inp.value='';
    };
    r.readAsText(f);
  },

  /* ── Transaction Save / Load ── */
  saveTransaction:function(){
    var data={
      _type:'re-transaction',
      _version:1,
      propertyName: S.propertyName||'',
      offerDate:    S.offerDate||null,
      mode:         S.mode,
      customClosing:S.customClosing||null,
      overrides:    clone(S.overrides),
      ignored:      clone(S.ignored),
      ignoredSections: clone(S.ignoredSections),
      includeLoan:  S.includeLoan,
      edTrigger:    S.edTrigger,
      ddrAnchor:    S.ddrAnchor
    };
    var filename=(S.propertyName||'transaction').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'-dates.json';
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  },
  loadTransaction:function(inp){
    var f=inp.files[0]; if(!f)return;
    var r=new FileReader();
    r.onload=function(e){
      try{
        var d=JSON.parse(e.target.result);
        if(d._type!=='re-transaction')
          throw new Error('This file does not appear to be a transaction save file.');
        S.propertyName   = d.propertyName||'';
        S.offerDate      = d.offerDate||null;
        S.mode           = d.mode||'40day';
        S.customClosing  = d.customClosing||null;
        S.overrides      = d.overrides||{};
        S.ignored        = d.ignored||{};
        S.ignoredSections= d.ignoredSections||{};
        S.includeLoan    = (d.includeLoan!==undefined)?d.includeLoan:true;
        S.edTrigger      = d.edTrigger||'acceptance';
        S.ddrAnchor      = d.ddrAnchor||'ddObjection';
        // Clear session-only state that must not bleed across transactions
        S.dayOverrides   = {};
        delete S._icActualManualSkip;
        delete S._icActualManualShow;
        // Sync property name input if visible
        var pni=document.getElementById('propertyNameInput');
        if(pni) pni.value=S.propertyName;
        render();
      }catch(err){ alert('Load failed: '+err.message); }
      inp.value='';
    };
    r.readAsText(f);
  }
};

/* ============================================================
   ADD HOLIDAY MODAL
   Dynamically creates a modal overlay for adding custom holidays.
   Custom holidays are fixed-date (month + day, repeating annually).
   Appended to document.body and removed on close.
   ============================================================ */
function _showAddHolModal(){
  var div=document.createElement('div');
  div.className='modal-overlay'; div.id='addHolModal';
  div.innerHTML='<div class="modal"><h3>Add Custom Holiday</h3>'
    +'<div class="modal-field"><label>Holiday Name</label>'
    +'<input type="text" id="ahn" placeholder="e.g., Christmas Eve"></div>'
    +'<div class="modal-field"><label>Date (month &amp; day — applies every year)</label>'
    +'<input type="date" id="ahd"></div>'
    +'<div class="modal-acts">'
    +'<button class="btn-sec" onclick="App._closeHolModal()">Cancel</button>'
    +'<button class="btn-pri" onclick="App._addHol()">Add Holiday</button>'
    +'</div></div>';
  document.body.appendChild(div);
  setTimeout(function(){ var el=document.getElementById('ahn'); if(el)el.focus(); },50);
  App._closeHolModal=function(){ var el=document.getElementById('addHolModal'); if(el)el.remove(); };
  App._addHol=function(){
    var name=(document.getElementById('ahn').value||'').trim();
    var dv=document.getElementById('ahd').value;
    if(!name||!dv){ alert('Please enter a name and date.'); return; }
    var parts=dv.split('-');
    S.settings.holidays.push({id:'cust_'+Date.now(),name:name,type:'fixed',month:+parts[1],day:+parts[2]});
    clearHolCache(); saveSettings(); App._closeHolModal(); _renderSettings(); render();
  };
}

/* ============================================================
   HELPERS
   esc()     — HTML-escapes a string for safe innerHTML insertion
   _icsEsc() — escapes a string for iCalendar (RFC 5545) SUMMARY/DESCRIPTION
   clone()   — deep-clones a JSON-serializable object
   merge()   — shallow-merges object b into a copy of object a
   ============================================================ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _icsEsc(s){ return String(s).replace(/\\/g,'\\\\').replace(/,/g,'\\,').replace(/;/g,'\\;').replace(/\n/g,'\\n'); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function merge(a,b){ var r=clone(a); Object.keys(b).forEach(function(k){ r[k]=b[k]; }); return r; }

/* ============================================================
   CALENDAR VIEW
   Renders a multi-month calendar grid derived from calc() output.
   _buildMilestoneMap() collects all visible milestone dates into a
   map keyed by YYYY-MM-DD. Each entry can be a solid badge (calculated
   date) or a ghost badge (effective/rollover date).
   _renderCalendar() auto-detects the date range and renders only
   the months that contain milestones (max 12 months).
   ============================================================ */
var _calView='detail';
var GROUP_COLORS={offer:'badge-offer',financing:'badge-financing',dd:'badge-dd',newsurvey:'badge-newsurvey',insurance:'badge-insurance',closing:'badge-closing'};

/** Builds a map of YYYY-MM-DD -> [{num, lbl, groupId, colorCls, isGhost, key}]
 * for calendar rendering. Skipped/ignored milestones are excluded.
 * Ghost entries represent effective (rolled-forward) dates. */
function _buildMilestoneMap(computed){
  // Returns { 'YYYY-MM-DD': [{num, lbl, groupId, isGhost}] }
  // Numbers must exactly match the sequential numbers shown in the Detail View:
  //   - inputOnly and isDefault fields are not numbered (no badge)
  //   - ALL other fields consume a number regardless of ignored state
  //     so that numbers stay consistent whether a field is skipped or not
  var map={};
  var loanSuppressed=!S.includeLoan;
  var counter=0;

  function addDay(ymd, entry){
    if(!map[ymd]) map[ymd]=[];
    map[ymd].push(entry);
  }

  GROUPS.forEach(function(grp){
    var secIgnored=!!S.ignoredSections[grp.id];
    grp.keys.forEach(function(k){
      var fd=FD_MAP[k]; if(!fd) return;
      var isIgnored=secIgnored||(loanSuppressed&&!!fd.loan)||!!S.ignored[k];
      // Increment counter for every numbered field (matches detail view numbering)
      // inputOnly and isDefault fields are not numbered in either view
      if(!fd.inputOnly&&!fd.isDefault) counter++;
      var num=counter;
      // Skip ignored fields — no badge on calendar
      if(isIgnored) return;
      // Skip fields with no date
      var date=computed.dates[k]; if(!date) return;
      var colorCls=GROUP_COLORS[grp.id]||'badge-offer';
      // Solid badge on Calculated Date
      addDay(toYMD(date),{num:num,lbl:fd.lbl,groupId:grp.id,colorCls:colorCls,isGhost:false,key:k});
      // Ghost badge on Effective Date if different (Days Language Rollover)
      var effDate=computed.effective&&computed.effective[k];
      if(effDate && toYMD(effDate)!==toYMD(date)){
        addDay(toYMD(effDate),{num:num,lbl:fd.lbl,groupId:grp.id,colorCls:colorCls,isGhost:true,key:k});
      }
    });
  });
  return map;
}

/** Renders the multi-month calendar view into #calContainer.
 * Auto-detects date range from milestone dates. Attaches tooltip handlers. */
function _renderCalendar(computed){
  var milMap=_buildMilestoneMap(computed);
  if(!Object.keys(milMap).length&&!computed.dates.offerDate){
    document.getElementById('calContainer').innerHTML='<p style="color:#94a3b8;text-align:center;padding:2rem">Enter an Offer Date to see the calendar view.</p>';
    return;
  }

  // Find date range: all milestone dates + offer date
  var allDates=Object.keys(milMap).map(function(d){return parseYMD(d);});
  if(computed.dates.offerDate) allDates.push(computed.dates.offerDate);
  if(!allDates.length){
    document.getElementById('calContainer').innerHTML='<p style="color:#94a3b8;text-align:center;padding:2rem">No dates to display.</p>';
    return;
  }
  allDates.sort(function(a,b){return a-b;});
  var minDate=allDates[0], maxDate=allDates[allDates.length-1];
  var startMonth=new Date(minDate.getFullYear(),minDate.getMonth(),1);
  var endMonth=new Date(maxDate.getFullYear(),maxDate.getMonth(),1);

  var today=new Date(); today=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  var todayYMD=toYMD(today);

  var monthsHtml='<div class="cal-months">';
  var cur=new Date(startMonth);
  var monthCount=0;
  while(cur<=endMonth && monthCount<12){
    monthsHtml+=_renderMonth(cur,milMap,todayYMD,computed);
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    monthCount++;
  }
  monthsHtml+='</div>';

  // Legend
  var legendHtml='<div class="cal-legend">';
  var groups=[
    {id:'offer',lbl:'Offer & Acceptance',cls:'badge-offer'},
    {id:'financing',lbl:'Financials',cls:'badge-financing'},
    {id:'dd',lbl:'Due Diligence',cls:'badge-dd'},
    {id:'newsurvey',lbl:'New Survey',cls:'badge-newsurvey'},
    {id:'insurance',lbl:'Insurance',cls:'badge-insurance'},
    {id:'closing',lbl:'Closing',cls:'badge-closing'},
  ];
  groups.forEach(function(g){
    legendHtml+='<div class="cal-legend-item"><div class="cal-legend-swatch '+g.cls+'"></div>'+esc(g.lbl)+'</div>';
  });
  legendHtml+='<div class="cal-legend-item"><div class="cal-legend-swatch badge-offer" style="opacity:.38"></div>Days Language Rollover</div>';
  legendHtml+='<div class="cal-legend-item" style="margin-left:auto"><span style="display:inline-block;width:12px;height:12px;background:#f1f5f9;border-radius:2px;margin-right:.3rem"></span>Weekend</div>';
  legendHtml+='<div class="cal-legend-item"><span style="display:inline-block;width:12px;height:12px;background:#fefce8;border-radius:2px;margin-right:.3rem"></span>Holiday</div>';
  legendHtml+='</div>';

  // ── Numbered milestone legend ──
  var calLoanSuppressed=!S.includeLoan;
  var calCounter=0; var calLegRows='';
  GROUPS.forEach(function(grp){
    var secIgnored=!!S.ignoredSections[grp.id];
    var grpColor=({'offer':'#1d4ed8','financing':'#0d9488','dd':'#ea580c','newsurvey':'#6d28d9','insurance':'#0891b2','closing':'#b91c1c'}[grp.id])||'#0f172a';
    var grpItems='';
    grp.keys.forEach(function(k){
      var fd=FD_MAP[k]; if(!fd) return;
      var isIgnored=secIgnored||(calLoanSuppressed&&!!fd.loan)||!!S.ignored[k];
      if(!fd.inputOnly&&!fd.isDefault) calCounter++;
      var num=calCounter;
      if(isIgnored) return;
      var date=computed.dates[k]; if(!date) return;
      var eff=computed.effective&&computed.effective[k];
      var effStr=(eff&&toYMD(eff)!==toYMD(date))?(' <span style="color:#7c3aed;font-size:.58rem">&#x2192; '+esc(fmtShort(eff))+'</span>'):'';
      grpItems+='<div class="cal-legend-ms-row">'
        +'<span class="cal-badge '+('offer'===grp.id?'badge-offer':'financing'===grp.id?'badge-financing':'dd'===grp.id?'badge-dd':'newsurvey'===grp.id?'badge-newsurvey':'insurance'===grp.id?'badge-insurance':'badge-closing')+'" style="width:20px;height:20px;font-size:.58rem;flex-shrink:0">'+num+'</span>'
        +'<span class="cal-legend-ms-name">'+esc(fd.lbl.replace(/ \(\d+\..*?\)/,''))+'</span>'
        +'<span class="cal-legend-ms-date">'+esc(fmtShort(date))+effStr+'</span>'
        +'</div>';
    });
    if(grpItems){
      calLegRows+='<div class="cal-legend-ms-group">'
        +'<div class="cal-legend-ms-title" style="color:'+grpColor+'">'+esc(grp.lbl.toUpperCase())+'</div>'
        +grpItems+'</div>';
    }
  });
  if(calLegRows) legendHtml+='<div class="cal-legend-ms">'+calLegRows+'</div>';

  document.getElementById('calContainer').innerHTML=monthsHtml+legendHtml;

  // Unified tooltip handler for calendar badges and timeline dots
  document.getElementById('calContainer').addEventListener('mousemove',function(e){
    var badge=e.target.closest('.cal-badge,.cal-badge-ghost,.tl-dot,.tl-dot-ghost');
    if(!badge){document.getElementById('calTooltip').style.display='none';return;}
    var tip=document.getElementById('calTooltip');
    var isGhost=badge.classList.contains('cal-badge-ghost')||badge.classList.contains('tl-dot-ghost');
    var dateStr=badge.dataset.date?('<br><span style="color:#94a3b8;font-size:.72rem">'+badge.dataset.date+'</span>'):'';
    tip.innerHTML=(isGhost?'<em style="color:#94a3b8;font-size:.7rem">Days Language Rollover</em><br>':'')+esc(badge.dataset.lbl||'')+dateStr;
    tip.style.display='block';
    tip.style.left=(e.clientX+12)+'px';
    tip.style.top=(e.clientY-8)+'px';
  });
  document.getElementById('calContainer').addEventListener('mouseleave',function(){
    document.getElementById('calTooltip').style.display='none';
  });
}

/** Renders the Transaction Story Timeline into #timelineContainer. */
function _renderTimelineView(computed){
  var tEl=document.getElementById('timelineContainer');
  if(!tEl) return;
  if(!computed.dates.offerDate){
    tEl.innerHTML='<p style="color:#94a3b8;text-align:center;padding:2rem">Enter an Offer Date to see the timeline.</p>';
    return;
  }
  var allDates=[];
  GROUPS.forEach(function(grp){
    grp.keys.forEach(function(k){
      var d=computed.dates[k]; if(d) allDates.push(d);
    });
  });
  if(!allDates.length){ tEl.innerHTML='<p style="color:#94a3b8;text-align:center;padding:2rem">No dates to display.</p>'; return; }
