  tEl.innerHTML='<div style="padding:.5rem 0">'+_renderTimeline(computed,allDates[0],allDates[allDates.length-1])+'</div>';
}

/** Renders a single month grid with milestone badges.
 * Pads start/end with adjacent-month day numbers. */
function _renderMonth(monthDate, milMap, todayYMD, computed){
  var y=monthDate.getFullYear(), m=monthDate.getMonth();
  var MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var html='<div class="cal-month"><div class="cal-month-title">'+MONTH_NAMES[m]+' '+y+'</div><div class="cal-grid">';
  var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  DOW.forEach(function(d){ html+='<div class="cal-dow">'+d+'</div>'; });

  var firstDay=new Date(y,m,1).getDay();
  var daysInMonth=new Date(y,m+1,0).getDate();

  // Pad start
  for(var i=0;i<firstDay;i++){
    var prevDate=new Date(y,m,1-firstDay+i);
    html+='<div class="cal-day other-month"><div class="cal-day-num">'+prevDate.getDate()+'</div></div>';
  }

  for(var d=1;d<=daysInMonth;d++){
    var dayDate=new Date(y,m,d);
    var ymd=toYMD(dayDate);
    var wd=dayDate.getDay();
    var isWknd=wd===0||wd===6;
    var holName=getHolName(dayDate);
    var entries=milMap[ymd]||[];
    var cls='cal-day';
    if(isWknd) cls+=' weekend';
    if(holName) cls+=' holiday';
    if(ymd===todayYMD) cls+=' today';
    if(entries.length) cls+=' has-milestone';

    html+='<div class="'+cls+'" title="'+(holName?esc(holName):'')+'"><div class="cal-day-num">'+d+'</div>';
    if(entries.length){
      html+='<div class="cal-badges">';
      entries.forEach(function(e){
        if(e.isGhost){
          html+='<div class="cal-badge-ghost" data-lbl="'+esc(e.lbl)+'" data-key="'+e.key+'">'+e.num+'</div>';
        } else {
          html+='<div class="cal-badge '+e.colorCls+'" data-lbl="'+esc(e.lbl)+'" data-key="'+e.key+'">'+e.num+'</div>';
        }
      });
      html+='</div>';
    }
    html+='</div>';
  }

  // Pad end
  var lastDay=new Date(y,m,daysInMonth).getDay();
  if(lastDay<6){
    for(var j=lastDay+1;j<=6;j++){
      var nextDate=new Date(y,m+1,j-lastDay);
      html+='<div class="cal-day other-month"><div class="cal-day-num">'+nextDate.getDate()+'</div></div>';
    }
  }
  html+='</div></div>';
  return html;
}

/* ============================================================
   HELP VIEW
   Help content lives in <template id="helpTpl"> in the HTML.
   _renderHelp() copies it into #helpContainer and wires the
   scroll-spy for the sidebar navigation.
   ============================================================ */

/** Renders the help documentation from the #helpTpl template element. */
function _renderHelp(){
  var tpl=document.getElementById('helpTpl');
  if(!tpl) return;
  document.getElementById('helpContainer').innerHTML=tpl.innerHTML;
  // Scroll-spy: highlight active nav link as user scrolls
  var helpPane=document.getElementById('paneHelp');
  if(!helpPane._scrollListenerAdded){
    helpPane._scrollListenerAdded=true;
    helpPane.addEventListener('scroll',function(){
      var links=document.querySelectorAll('.help-nav-sidebar a');
      var scrollY=helpPane.scrollTop+120;
      var active=null;
      links.forEach(function(a){
        var id=a.getAttribute('data-sec');
        var el=document.getElementById('help-'+id);
        if(el&&el.offsetTop<=scrollY) active=a;
      });
      links.forEach(function(a){ a.classList.remove('active'); });
      if(active) active.classList.add('active');
    },{passive:true});
  }
}

/** Scrolls the help pane to a section by id. */
App._helpScroll=function(id){
  var el=document.getElementById('help-'+id);
  var pane=document.getElementById('paneHelp');
  if(el&&pane) pane.scrollTo({top:el.offsetTop-16,behavior:'smooth'});
};


/* ============================================================
   TRANSACTION STORY TIMELINE
   A single-river, chapter-based visual timeline.
   Key concepts:
     chapter bands: colored arcs per group spanning their window
     alternating markers: milestones alternate above/below axis
     urgency zones: amber/red tint near closing
     anchor pills: Offer, Acceptance, Closing labeled on axis
   ============================================================ */

/** Shared data builder used by both HTML and PDF renderers. */
function _buildTimelineData(computed){
  var loanSuppressed=!S.includeLoan;
  var GROUP_META=[
    {id:'offer',    lbl:'Offer & Acceptance',color:'#1d4ed8',rgb:[29,78,216]},
    {id:'financing',lbl:'Financials',        color:'#0d9488',rgb:[13,148,136]},
    {id:'dd',       lbl:'Due Diligence',     color:'#ea580c',rgb:[234,88,12]},
    {id:'newsurvey',lbl:'New Survey',        color:'#6d28d9',rgb:[109,40,217]},
    {id:'insurance',lbl:'Insurance',         color:'#0891b2',rgb:[8,145,178]},
    {id:'closing',  lbl:'Closing',           color:'#b91c1c',rgb:[185,28,28]},
  ];
  var allItems=[], counter=0;
  GROUPS.forEach(function(grp){
    var meta=GROUP_META.filter(function(g){return g.id===grp.id;})[0];
    if(!meta) return;
    var secIgnored=!!S.ignoredSections[grp.id];
    grp.keys.forEach(function(k){
      var fd=FD_MAP[k]; if(!fd) return;
      var isIgnored=secIgnored||(loanSuppressed&&!!fd.loan)||!!S.ignored[k];
      if(!fd.inputOnly&&!fd.isDefault) counter++;
      var num=counter;
      if(isIgnored) return;
      var date=computed.dates[k]; if(!date) return;
      var eff=computed.effective&&computed.effective[k];
      allItems.push({
        num:num, lbl:fd.lbl, key:k, date:date,
        color:meta.color, rgb:meta.rgb, groupId:grp.id,
        effDate:(eff&&toYMD(eff)!==toYMD(date))?eff:null,
        isClose:(k==='closingDate')
      });
    });
  });
  if(!allItems.length) return null;
  allItems.sort(function(a,b){return a.date-b.date;});

  var offerDate  = computed.dates.offerDate;
  var closeDate  = computed.dates.closingDate;
  var acc        = computed.dates.acceptanceDate;
  var tlStart    = offerDate ? addDays(offerDate,-2) : addDays(allItems[0].date,-2);
  var tlEnd      = closeDate ? addDays(closeDate, 3) : addDays(allItems[allItems.length-1].date,3);
  var totalDays  = Math.max(diffDays(tlStart,tlEnd),1);
  function pct(d){ return Math.max(0,Math.min(100,(diffDays(tlStart,d)/totalDays)*100)); }

  // Chapter spans (min→max date per active group)
  var chapterSpans=[];
  GROUP_META.forEach(function(meta){
    var gItems=allItems.filter(function(i){return i.groupId===meta.id;});
    if(!gItems.length) return;
    var dates=gItems.map(function(i){return i.date;});
    var mn=dates.reduce(function(a,b){return a<b?a:b;});
    var mx=dates.reduce(function(a,b){return a>b?a:b;});
    chapterSpans.push({meta:meta,left:pct(mn),right:pct(mx)});
  });

  // Grid lines
  var useWeeks=(totalDays>=21);
  var gridLines=[];
  var MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var gs=new Date(tlStart);
  if(useWeeks){while(gs.getDay()!==1) gs=addDays(gs,1);}
  while(gs<=tlEnd){
    var isM=(gs.getDate()===1);
    gridLines.push({pct:pct(gs),isMonth:isM,
      label:isM?(MNAMES[gs.getMonth()]+' '+gs.getFullYear()):String(gs.getDate())});
    gs=addDays(gs,useWeeks?7:1);
  }

  // Urgency zones
  var urgencyZones=[];
  if(closeDate){
    urgencyZones.push({left:pct(addDays(closeDate,-7)),right:pct(closeDate),color:'rgba(251,191,36,.10)'});
    urgencyZones.push({left:pct(addDays(closeDate,-3)),right:pct(closeDate),color:'rgba(239,68,68,.09)'});
  }

  // Anchor labels
  var anchors=[];
  if(offerDate) anchors.push({pct:pct(offerDate),lbl:'Offer'});
  if(acc&&acc!==offerDate) anchors.push({pct:pct(acc),lbl:'Acceptance'});
  if(closeDate) anchors.push({pct:pct(closeDate),lbl:'Closing'});

  return {items:allItems,chapterSpans:chapterSpans,gridLines:gridLines,
          urgencyZones:urgencyZones,anchors:anchors,pct:pct,
          GROUP_META:GROUP_META,useWeeks:useWeeks};
}

/** Renders the Transaction Story Timeline. */
function _renderTimeline(computed, minDate, maxDate){
  var td = _buildTimelineData(computed);
  if(!td) return '';
  var pct = td.pct;
  var loanSuppressed = !S.includeLoan;

  // ── Build per-group milestone lists ──
  var groupItems = {};
  td.GROUP_META.forEach(function(g){ groupItems[g.id] = []; });
  var counter = 0;
  GROUPS.forEach(function(grp){
    var secIgnored = !!S.ignoredSections[grp.id];
    grp.keys.forEach(function(k){
      var fd = FD_MAP[k]; if(!fd) return;
      var isIgnored = secIgnored||(loanSuppressed&&!!fd.loan)||!!S.ignored[k];
      if(!fd.inputOnly&&!fd.isDefault) counter++;
      var num = counter;
      if(isIgnored) return;
      var date = computed.dates[k]; if(!date) return;
      var eff = computed.effective&&computed.effective[k];
      if(groupItems[grp.id])
        groupItems[grp.id].push({num:num,lbl:fd.lbl,key:k,date:date,
          effDate:(eff&&toYMD(eff)!==toYMD(date))?eff:null});
    });
  });

  // ── Tier assignment (greedy left-to-right collision avoidance) ──
  var COLLISION_PCT = 3.5;
  function assignTiers(items){
    if(!items.length) return {items:items,tiers:1};
    var sorted = items.slice().sort(function(a,b){return a.date-b.date;});
    var tierEnds = [];
    sorted.forEach(function(item){
      var p = pct(item.date); var placed=false;
      for(var t=0;t<tierEnds.length;t++){
        if(p-tierEnds[t]>=COLLISION_PCT){ item.tier=t; tierEnds[t]=p; placed=true; break; }
      }
      if(!placed){ item.tier=tierEnds.length; tierEnds.push(p); }
    });
    return {items:items,tiers:tierEnds.length};
  }

  // ── Shared grid HTML ──
  function gridHtml(){
    var s='';
    td.gridLines.forEach(function(gl){
      s+='<div class="tl-grid-line" style="left:'+gl.pct+'%;background:'
        +(gl.isMonth?'#d1d5db':'#f1f5f9')+';opacity:'+(gl.isMonth?'.6':'.35')+'"></div>';
    });
    td.urgencyZones.forEach(function(uz){
      s+='<div class="tl-urgency-zone" style="left:'+uz.left+'%;right:'+(100-uz.right)+'%;background:'+uz.color+'"></div>';
    });
    return s;
  }

  var DOT_D  = 30;
  var PAD    = 8;
  var TIER_H = DOT_D + PAD*2;  // 46px per tier

  var h = '<div class="cal-timeline">';
  h += '<div class="cal-timeline-title">Transaction Story</div>';
  h += '<div class="cal-timeline-sub">One row per group \u2014 numbers match the Detail View. Hover any dot for details.</div>';
  h += '<div class="tl-canvas">';

  // ── Anchor header — label column spacer + track-relative anchor pills ──
  h += '<div class="tl-row" style="margin-bottom:4px;height:26px">';
  h += '<div class="tl-row-label"></div>';  // spacer matching lane label width
  h += '<div style="flex:1;position:relative;height:26px">';
  td.anchors.forEach(function(a){
    var lineColor = a.lbl==='Closing'?'#b91c1c':(a.lbl==='Acceptance'?'#0d9488':'#1d4ed8');
    h += '<div style="position:absolute;left:'+a.pct+'%;top:0;bottom:0;width:1.5px;background:'+lineColor+';opacity:.3;transform:translateX(-50%)"></div>';
    h += '<div style="position:absolute;left:'+a.pct+'%;top:3px;transform:translateX(-50%);background:'+lineColor
       + ';color:white;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;z-index:4;box-shadow:0 1px 3px rgba(0,0,0,.15)">'
       + esc(a.lbl)+'</div>';
  });
  h += '</div>';
  h += '</div>';

  // ── Swim lanes ──
  td.GROUP_META.forEach(function(meta){
    var rawItems = groupItems[meta.id];
    if(!rawItems||!rawItems.length) return;
    var result = assignTiers(rawItems);
    var tiers = result.tiers;
    var laneH = tiers * TIER_H;

    h += '<div class="tl-row" style="margin-bottom:3px">';
    h += '<div class="tl-row-label">';
    h += '<div class="tl-row-label-pill" style="background:'+meta.color+'">'+esc(meta.lbl)+'</div>';
    h += '</div>';
    h += '<div class="tl-row-track" style="height:'+laneH+'px">';
    h += gridHtml();

    // Axis line per tier
    for(var t=0;t<tiers;t++){
      var ay = t*TIER_H + PAD + DOT_D/2;
      h += '<div style="position:absolute;left:0;right:0;top:'+ay+'px;height:'+(t===0?'1.5':'1')+'px;background:'+(t===0?'#e2e8f0':'#f1f5f9')+';z-index:0"></div>';
    }

    // Anchor drop lines through the lane
    td.anchors.forEach(function(a){
      var lineColor = a.lbl==='Closing'?'#b91c1c':(a.lbl==='Acceptance'?'#0d9488':'#1d4ed8');
      h += '<div style="position:absolute;left:'+a.pct+'%;top:0;bottom:0;width:1.5px;background:'+lineColor+';opacity:.2;transform:translateX(-50%);z-index:1"></div>';
    });

    // Dots
    rawItems.forEach(function(item){
      var p  = pct(item.date);
      var ty = (item.tier||0)*TIER_H + PAD;
      var dateStr = fmtShort(item.date);
      h += '<div class="tl-mk" style="left:'+p+'%;top:'+ty+'px"';
      h += ' onmouseenter="App._tlTip(event,\''+esc(item.lbl)+'\',\''+esc(dateStr)+'\',0)"';
      h += ' onmouseleave="App._tlTipHide()">';
      h += '<div class="tl-mk-dot" style="background:'+meta.color+'">'+item.num+'</div>';
      h += '</div>';
      if(item.effDate){
        var ep=pct(item.effDate); var effStr=fmtShort(item.effDate);
        h += '<div class="tl-mk" style="left:'+ep+'%;top:'+ty+'px"';
        h += ' onmouseenter="App._tlTip(event,\''+esc(item.lbl)+' \u2014 Rollover\',\''+esc(effStr)+'\',1)"';
        h += ' onmouseleave="App._tlTipHide()">';
        h += '<div class="tl-mk-dot ghost" style="background:'+meta.color+'">'+item.num+'</div>';
        h += '</div>';
      }
    });

    h += '</div>';  // tl-row-track
    h += '</div>';  // tl-row
  });

  // ── X-axis tick labels ──
  h += '<div class="tl-axis-bar"></div>';
  h += '<div class="tl-axis-labels">';
  td.gridLines.forEach(function(gl){
    if(gl.isMonth||td.useWeeks)
      h += '<div class="tl-axis-label" style="left:'+gl.pct+'%;color:'
        +(gl.isMonth?'#475569':'#94a3b8')+';font-weight:'+(gl.isMonth?'700':'400')+'">'+esc(gl.label)+'</div>';
  });
  h += '</div>';

  // ── Numbered legend ──
  h += '<div class="tl-legend">';
  td.GROUP_META.forEach(function(meta){
    var items2=groupItems[meta.id];
    if(!items2||!items2.length) return;
    h += '<div class="tl-legend-group">';
    h += '<div class="tl-legend-group-title" style="color:'+meta.color+'">'+esc(meta.lbl)+'</div>';
    items2.forEach(function(item){
      var dateStr=fmtShort(item.date);
      var effStr=item.effDate?(' \u2192 '+fmtShort(item.effDate)):'';
      h += '<div class="tl-legend-row">';
      h += '<span class="tl-legend-num" style="background:'+meta.color+'">'+item.num+'</span>';
      h += '<span class="tl-legend-name">'+esc(item.lbl.replace(/ \(\d+\..*?\)/,''))+'</span>';
      h += '<span class="tl-legend-date">'+esc(dateStr)+esc(effStr)+'</span>';
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div>';

  h += '</div>';  // tl-canvas
  h += '</div>';  // cal-timeline
  return h;
}










/* ============================================================
   PDF EXPORT MODULE
   Programmatic PDF generation using jsPDF + AutoTable.
   Three separate PDFs, one per view:
     • Detail View  — milestone table grouped by section
     • Calendar View — multi-month grid (one page) + timeline (second page)
     • Help View    — full documentation
   All colors match the UI palette exactly.
   ============================================================ */

/* ── Shared palette (matches UI group header colors) ── */
var PDF_COLORS = {
  offer:     [29,  78,  216],   // #1d4ed8 blue
  financing: [13,  148, 136],   // #0d9488 teal
  dd:        [234, 88,  12 ],   // #ea580c orange
  newsurvey: [109, 40,  217],   // #6d28d9 purple
  insurance: [8,   145, 178],   // #0891b2 cyan
  closing:   [185, 28,  28 ],   // #b91c1c red
  text:      [15,  23,  42 ],   // #0f172a near-black
  subtext:   [71,  85,  105],   // #475569 slate
  muted:     [148, 163, 184],   // #94a3b8 light slate
  border:    [226, 232, 240],   // #e2e8f0 light gray
  effective: [6,   182, 212],   // #06b6d4 cyan for effective dates
  weekend:   [241, 245, 249],   // #f1f5f9 weekend bg
  holiday:   [254, 252, 232],   // #fefce8 holiday bg
  today:     [59,  130, 246],   // #3b82f6 blue today
  white:     [255, 255, 255],
  pagebg:    [248, 250, 252],   // #f8fafc very light page bg
};

/** Returns the RGB color array for a group id */
function _pdfGroupColor(groupId){
  return PDF_COLORS[groupId] || PDF_COLORS.text;
}

/** Formats a Date as "Monday, January 1, 2025" */
function _pdfFmtLong(d){
  if(!d) return '—';
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

/** Formats a Date as "Mon Jan 1" */
function _pdfFmtShort(d){
  if(!d) return '—';
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+' '+months[d.getMonth()]+' '+d.getDate();
}

/** Draws the standard page header used on every PDF page */
function _pdfPageHeader(doc, title, subtitle, pageW){
  // Solid dark header bar
  doc.setFillColor.apply(doc, PDF_COLORS.text);
  doc.rect(0, 0, pageW, 20, 'F');
  // Accent rule — 3px blue line at bottom of header
  doc.setFillColor.apply(doc, PDF_COLORS.today);
  doc.rect(0, 19, pageW, 1, 'F');
  // Title — large, white, bold
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(255,255,255);
  doc.text(title, 14, 13.5);
  // Subtitle right-aligned
  if(subtitle){
    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    doc.setTextColor(160,175,200);
    doc.text(subtitle, pageW - 14, 13.5, {align:'right'});
  }
  doc.setTextColor.apply(doc, PDF_COLORS.text);
}

/** Draws a footer with page number and timestamp */
function _pdfPageFooter(doc, pageNum, totalPages, pageW, pageH){
  // Light rule above footer
  doc.setDrawColor.apply(doc, PDF_COLORS.border);
  doc.setLineWidth(0.3);
  doc.line(14, pageH - 12, pageW - 14, pageH - 12);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor.apply(doc, PDF_COLORS.muted);
  var now = new Date();
  var ts = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
           + '  ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  doc.text('RE Transaction Date Calculator', 14, pageH - 7);
  doc.setFont('helvetica','bold');
  doc.setTextColor.apply(doc, PDF_COLORS.subtext);
  doc.text('Page ' + pageNum + ' of ' + totalPages, pageW/2, pageH - 7, {align:'center'});
  doc.setFont('helvetica','normal');
  doc.setTextColor.apply(doc, PDF_COLORS.muted);
  doc.text(ts, pageW - 14, pageH - 7, {align:'right'});
}

/** Returns property name + offer date subtitle string */
function _pdfSubtitle(computed){
  var parts = [];
  if(S.propertyName) parts.push(S.propertyName);
  if(computed.dates.offerDate) parts.push('Offer: ' + _pdfFmtShort(computed.dates.offerDate));
  if(computed.dates.acceptanceDate && computed.dates.acceptanceDate !== computed.dates.offerDate)
    parts.push('Acceptance: ' + _pdfFmtShort(computed.dates.acceptanceDate));
  return parts.join('   |   ');
}

/* ================================================================
   DETAIL VIEW PDF
   ================================================================ */
function _pdfDetail(){
  var computed = calc();
  var loanSuppressed = !S.includeLoan;
  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var pageW = doc.internal.pageSize.getWidth();   // 215.9mm
  var pageH = doc.internal.pageSize.getHeight();  // 279.4mm
  var margin = 14;
  var contentW = pageW - margin * 2;              // 187.9mm

  // Text-only group section labels (jsPDF built-in fonts don't support emoji)
  var GRP_LABELS = {
    offer:'OFFER & ACCEPTANCE', financing:'FINANCIALS', dd:'DUE DILIGENCE',
    newsurvey:'NEW SURVEY', insurance:'INSURANCE', closing:'CLOSING'
  };

  var subtitle = _pdfSubtitle(computed);

  // Collect all rows grouped by section
  var allRows = [];
  var milCounter = 0;

  GROUPS.forEach(function(grp){
    var secIgnored = !!S.ignoredSections[grp.id];
    var groupColor = _pdfGroupColor(grp.id);
    var groupRows = [];

    grp.keys.forEach(function(k){
      var fd = FD_MAP[k]; if(!fd) return;
      var isIgnored = secIgnored || (loanSuppressed && !!fd.loan) || !!S.ignored[k];
      if(!fd.inputOnly && !fd.isDefault) milCounter++;
      if(isIgnored) return;
      var num = (!fd.inputOnly && !fd.isDefault) ? milCounter : '';

      var date    = computed.dates[k];
      var effDate = computed.effective && computed.effective[k];
      var hasEff  = effDate && toYMD(effDate) !== toYMD(date);

      // Anchor label — plain text only
      var anchLbl = fd.anchLbl || '';
      if(k === 'existingDocDelivery')
        anchLbl = S.edTrigger === 'icActual' ? 'IC Actual' : 'Acceptance';
      if(k === 'dueDiligenceResolution'){
        var ddrMap = {
          acceptanceDate:'Acceptance',  ddObjection:'DD Objection',
          offerExpiration:'Offer Expiration', earnestMoneyDue:'Earnest Money',
          icDue:'IC Delivery', icActual:'IC Actual', loanApplication:'Loan Application',
          appraisalOrder:'Appraisal Order', titleCommitment:'Title Commitment',
          existingDocDelivery:'Existing Doc Delivery', existingSurveyDelivery:'Existing Survey',
          sellerInspectionOrder:'Seller Insp. Order', sellerInspectionDelivery:'Seller Insp. Delivery',
          dueDiligenceObjection:'DD Objection'
        };
        anchLbl = ddrMap[S.ddrAnchor] || 'DD Objection';
      }
      if(fd.isDefault) anchLbl = fd.defLbl || '';
      if(fd.inputOnly) anchLbl = 'User Input';

      // Days offset
      var daysVal = '';
      var offs = getOffsets();
      if(!fd.inputOnly && !fd.isDefault && offs){
        var dv = S.dayOverrides[k] !== undefined ? S.dayOverrides[k] : offs[k];
        if(dv !== undefined) daysVal = (dv >= 0 ? '+' : '') + dv;
      }

      // Date strings — plain ASCII, no special chars
      var dateStr = date ? _pdfFmtLong(date) : '--';
      var effStr  = hasEff ? ('Effective: ' + _pdfFmtShort(effDate)) : '';
      var isWkdHol = !!(date && isWeekendOrHol(date));

      groupRows.push({
        num: num ? (num + '.') : '',
        name: fd.lbl,
        anchor: anchLbl,
        days: daysVal,
        date: dateStr,
        eff: effStr,
        isWkdHol: isWkdHol,
        inputOnly: !!fd.inputOnly,
        groupId: grp.id,
        groupColor: groupColor,
      });
    });

    if(groupRows.length){
      allRows.push({ type:'header', label: GRP_LABELS[grp.id] || grp.lbl.toUpperCase(),
                     color: groupColor });
      groupRows.forEach(function(r){ allRows.push({ type:'row', row:r }); });
    }
  });

  // ── Build autoTable body ──
  var body = [];

  allRows.forEach(function(item){
    if(item.type === 'header'){
      // Section header row — spans all 5 columns, colored background, uppercase label
      body.push([{
        content: item.label,
        colSpan: 5,
        styles:{
          fillColor: item.color,
          textColor: [255,255,255],
          fontStyle: 'bold',
          fontSize: 8,
          font: 'helvetica',
          cellPadding: { top:3.5, bottom:3.5, left:5, right:4 },
          letterSpacing: 0.5,
        }
      }]);
    } else {
      var r = item.row;

      // Date cell: main date on first line, effective date in muted style below
      var dateContent = r.date;
      if(r.eff) dateContent += '\n' + r.eff;

      body.push([
        // # column
        { content: r.num,
          styles:{ halign:'center', fontSize:8, fontStyle:'bold',
                   textColor: r.num ? r.groupColor : PDF_COLORS.muted }
        },
        // Milestone name
        { content: r.name,
          styles:{ fontStyle: r.inputOnly ? 'italic' : 'normal', fontSize:8.5,
                   textColor: PDF_COLORS.text }
        },
        // Anchor
        { content: r.anchor,
          styles:{ fontSize:7.5, textColor: PDF_COLORS.subtext }
        },
        // Days
        { content: r.days,
          styles:{ halign:'center', fontSize:8, fontStyle:'bold',
                   textColor: r.days ? r.groupColor : PDF_COLORS.muted }
        },
        // Calculated date + effective
        { content: dateContent,
          styles:{
            fontSize: 8.5,
            textColor: r.isWkdHol ? [180,80,0] : PDF_COLORS.text,
            fontStyle: r.isWkdHol ? 'bold' : 'normal',
            cellPadding: { top:2, bottom:2, left:3, right:3 },
          }
        },
      ]);
    }
  });

  // ── Render table ──
  doc.autoTable({
    head: [[
      { content:'#',         styles:{ halign:'center', cellWidth:12 } },
      { content:'Milestone', styles:{ cellWidth:68 } },
      { content:'Anchor',    styles:{ cellWidth:36 } },
      { content:'Days',      styles:{ halign:'center', cellWidth:16 } },
      { content:'Calculated Date' },
    ]],
    body: body,
    startY: 24,
    margin: { left: margin, right: margin },
    tableWidth: contentW,
    styles:{
      font: 'helvetica',
      fontSize: 8.5,
      cellPadding: { top:2.5, bottom:2.5, left:3, right:3 },
      overflow: 'linebreak',
      lineColor: PDF_COLORS.border,
      lineWidth: 0.2,
      valign: 'middle',
    },
    headStyles:{
      fillColor: PDF_COLORS.text,
      textColor: [255,255,255],
      fontStyle: 'bold',
      fontSize: 8,
      cellPadding: { top:3.5, bottom:3.5, left:3, right:3 },
    },
    alternateRowStyles:{ fillColor:[248,250,252] },
    columnStyles:{
      0: { cellWidth:12, halign:'center' },
      1: { cellWidth:68 },
      2: { cellWidth:36 },
      3: { cellWidth:16, halign:'center' },
      4: { cellWidth:'auto' },
    },
    // Draw header and footer on every page
    didDrawPage: function(data){
      _pdfPageHeader(doc, 'Transaction Milestones', subtitle, pageW);
    },
  });

  // Stamp correct total page count on every page after table finishes
  var totalPages = doc.internal.getNumberOfPages();
  for(var p = 1; p <= totalPages; p++){
    doc.setPage(p);
    _pdfPageFooter(doc, p, totalPages, pageW, pageH);
  }

  var fn = (S.propertyName||'transaction').replace(/[^a-z0-9]/gi,'-').toLowerCase();
  doc.save(fn + '-milestones.pdf');
}


/* ================================================================
   CALENDAR + TIMELINE PDF
   Page 1: Multi-month calendar grid
   Page 2: Timeline badge chart
   ================================================================ */
function _pdfCalendar(){
  var computed = calc();
  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'letter' });
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var margin = 14;
  var subtitle = _pdfSubtitle(computed);
  var MNAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  var milMap = _buildMilestoneMap(computed);
  var allDates = Object.keys(milMap).map(function(d){ return parseYMD(d); });
  if(computed.dates.offerDate) allDates.push(computed.dates.offerDate);
  if(!allDates.length){ alert('No dates to export.'); return; }
  allDates.sort(function(a,b){ return a - b; });
  var minDate = allDates[0], maxDate = allDates[allDates.length-1];
  var startMonth = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  var endMonth   = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);

  // Collect months to render (max 4 on landscape letter)
  var months = [];
  var cur = new Date(startMonth);
  while(cur <= endMonth && months.length < 6){
    months.push(new Date(cur));
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  // ── PAGE 1: Calendar grid ──
  _pdfPageHeader(doc, 'Transaction Calendar', subtitle, pageW);

  var today = new Date(); today = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  var todayYMD = toYMD(today);

  // Layout: up to 3 columns of months
  var cols = Math.min(months.length, 3);
  var rows = Math.ceil(months.length / cols);
  var calAreaTop = 22;
  var calAreaH = pageH - calAreaTop - 14;
  var calAreaW = pageW - margin * 2;
  var monthW = (calAreaW - (cols-1)*6) / cols;
  var monthH = (calAreaH - (rows-1)*5) / rows;

  // Color map for group ids
  var GRP_RGB = {
    offer:[29,78,216], financing:[13,148,136], dd:[234,88,12],
    newsurvey:[109,40,217], insurance:[8,145,178], closing:[185,28,28]
  };

  months.forEach(function(monthDate, mi){
    var col = mi % cols;
    var row = Math.floor(mi / cols);
    var mx = margin + col * (monthW + 6);
    var my = calAreaTop + row * (monthH + 5);

    var y = monthDate.getFullYear(), m = monthDate.getMonth();

    // Month title
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor.apply(doc, PDF_COLORS.text);
    doc.text(MNAMES[m] + ' ' + y, mx + monthW/2, my + 5, {align:'center'});

    // Column headers
    var cellW = monthW / 7;
    var headerY = my + 8;
    doc.setFont('helvetica','bold');
    doc.setFontSize(6.5);
    doc.setTextColor.apply(doc, PDF_COLORS.muted);
    DOW.forEach(function(d, di){
      doc.text(d, mx + di*cellW + cellW/2, headerY, {align:'center'});
    });

    // Grid
    var firstDay = new Date(y, m, 1).getDay();
    var daysInMonth = new Date(y, m+1, 0).getDate();
    var cellH = (monthH - 10) / 6;
    var gridY = headerY + 2;

    // Separator line under day headers
    doc.setDrawColor.apply(doc, PDF_COLORS.border);
    doc.setLineWidth(0.3);
    doc.line(mx, gridY, mx + monthW, gridY);

    var dayCount = 0;
    var totalCells = 42; // 6 rows × 7
    for(var ci = 0; ci < totalCells; ci++){
      var dayNum = ci - firstDay + 1;
      var cx = mx + (ci % 7) * cellW;
      var cy = gridY + Math.floor(ci / 7) * cellH;
      var dow = ci % 7;

      // Background
      if(dayNum >= 1 && dayNum <= daysInMonth){
        var cellDate = new Date(y, m, dayNum);
        var cellYMD = toYMD(cellDate);
        var isToday = (cellYMD === todayYMD);
        var isWkd = (dow === 0 || dow === 6);
        var isHol = isHoliday(cellDate);

        if(isHol){
          doc.setFillColor.apply(doc, [254,252,232]);
          doc.rect(cx, cy, cellW, cellH, 'F');
        } else if(isWkd){
          doc.setFillColor.apply(doc, [241,245,249]);
          doc.rect(cx, cy, cellW, cellH, 'F');
        }

        if(isToday){
          doc.setDrawColor.apply(doc, PDF_COLORS.today);
          doc.setLineWidth(0.5);
          doc.rect(cx+0.3, cy+0.3, cellW-0.6, cellH-0.6);
          doc.setLineWidth(0.2);
          doc.setDrawColor.apply(doc, PDF_COLORS.border);
        }

        // Day number
        var hasMil = !!milMap[cellYMD];
        doc.setFont('helvetica', hasMil ? 'bold' : 'normal');
        doc.setFontSize(6);
        doc.setTextColor.apply(doc, hasMil ? PDF_COLORS.text : PDF_COLORS.muted);
        doc.text(String(dayNum), cx + 1.5, cy + 4);

        // Milestone badges
        if(milMap[cellYMD]){
          var badges = milMap[cellYMD];
          var bx = cx + 1;
          var by = cy + 5.5;
          var bSize = 4;
          badges.forEach(function(b, bi){
            if(bx + bSize > cx + cellW - 0.5){
              bx = cx + 1;
              by += bSize + 1;
            }
            var rgb = GRP_RGB[b.groupId] || PDF_COLORS.text;
            if(b.isGhost){
              // Ghost: lighter opacity ring
              doc.setDrawColor.apply(doc, rgb);
              doc.setFillColor(255,255,255);
              doc.setLineWidth(0.4);
              doc.circle(bx + bSize/2, by + bSize/2, bSize/2, 'FD');
              doc.setTextColor.apply(doc, rgb);
            } else {
              doc.setFillColor.apply(doc, rgb);
              doc.circle(bx + bSize/2, by + bSize/2, bSize/2, 'F');
              doc.setTextColor(255,255,255);
            }
            doc.setFont('helvetica','bold');
            doc.setFontSize(4.5);
            doc.text(String(b.num), bx + bSize/2, by + bSize/2 + bSize*0.18, {align:'center'});
            bx += bSize + 1;
          });
        }
      }

      // Cell border
      doc.setDrawColor.apply(doc, PDF_COLORS.border);
      doc.setLineWidth(0.15);
      doc.rect(cx, cy, cellW, cellH);
    }
  });

  // ── Legend: group swatch row + numbered milestone table ──
  // Place swatch row below the calendar grid
  var lgY = calAreaTop + calAreaH + 4;
  var lgX = margin;
  var GRPS = [
    {id:'offer',lbl:'Offer & Acceptance'},{id:'financing',lbl:'Financials'},
    {id:'dd',lbl:'Due Diligence'},{id:'newsurvey',lbl:'New Survey'},
    {id:'insurance',lbl:'Insurance'},{id:'closing',lbl:'Closing'},
  ];
  doc.setFontSize(6.5);
  GRPS.forEach(function(g){
    var rgb = GRP_RGB[g.id];
    doc.setFillColor.apply(doc, rgb);
    doc.circle(lgX+2, lgY-1, 2, 'F');
    doc.setFont('helvetica','normal');
    doc.setTextColor.apply(doc, PDF_COLORS.subtext);
    doc.text(g.lbl, lgX+5.5, lgY);
    lgX += doc.getTextWidth(g.lbl)+10;
  });
  doc.setDrawColor.apply(doc, PDF_COLORS.muted);
  doc.setFillColor(255,255,255);
  doc.circle(lgX+2, lgY-1, 2, 'FD');
  doc.setTextColor.apply(doc, PDF_COLORS.muted);
  doc.text('Rollover (Days Language)', lgX+5.5, lgY);

  // ── Numbered milestone table via autoTable ──
  var calLegBody = [];
  var calCounter2 = 0;
  var calLoanSup = !S.includeLoan;
  GROUPS.forEach(function(grp){
    var secIgnored2 = !!S.ignoredSections[grp.id];
    var grpRgb2 = GRP_RGB[grp.id] || PDF_COLORS.text;
    var grpRows2 = [];
    grp.keys.forEach(function(k){
      var fd = FD_MAP[k]; if(!fd) return;
      var isIgnored2 = secIgnored2||(calLoanSup&&!!fd.loan)||!!S.ignored[k];
      if(!fd.inputOnly&&!fd.isDefault) calCounter2++;
      var num = calCounter2;
      if(isIgnored2) return;
      var date2 = computed.dates[k]; if(!date2) return;
      var eff2 = computed.effective&&computed.effective[k];
      var effStr2 = (eff2&&toYMD(eff2)!==toYMD(date2)) ? (' -> '+_pdfFmtShort(eff2)) : '';
      var shortLbl2 = fd.lbl.replace(/ (\d+\..*?)$/,'').trim();
      grpRows2.push([
        { content:String(num), styles:{halign:'center',fontStyle:'bold',textColor:grpRgb2,fontSize:6.5} },
        { content:shortLbl2,   styles:{fontSize:6.5,textColor:PDF_COLORS.text} },
        { content:_pdfFmtShort(date2)+effStr2, styles:{fontSize:6,textColor:PDF_COLORS.subtext,halign:'right'} }
      ]);
    });
    if(grpRows2.length){
      calLegBody.push([{content:grp.lbl.toUpperCase(),colSpan:3,
        styles:{fillColor:grpRgb2,textColor:[255,255,255],fontStyle:'bold',fontSize:6,
                cellPadding:{top:2,bottom:2,left:3,right:3}}}]);
      grpRows2.forEach(function(r){ calLegBody.push(r); });
    }
  });
  if(calLegBody.length){
    doc.autoTable({
      body: calLegBody,
      startY: lgY + 5,
      margin: { left:margin, right:margin, top:26 },
      tableWidth: pageW - margin*2,
      styles:{ font:'helvetica', fontSize:6.5, cellPadding:{top:2,bottom:2,left:3,right:3},
               overflow:'linebreak', lineColor:PDF_COLORS.border, lineWidth:0.15 },
      alternateRowStyles:{ fillColor:[248,250,252] },
      columnStyles:{
        0: { cellWidth:14, halign:'center' },
        1: { cellWidth:'auto' },
        2: { cellWidth:42, halign:'right' }
      },
      didDrawPage: function(data){
        _pdfPageHeader(doc, 'Transaction Calendar', subtitle, pageW);
      }
    });
  }

  // Stamp correct total pages on all pages
  var calTotalPages = doc.internal.getNumberOfPages();
  for(var cp=1; cp<=calTotalPages; cp++){
    doc.setPage(cp);
    _pdfPageFooter(doc, cp, calTotalPages, pageW, pageH);
  }

  var fn = (S.propertyName||'transaction').replace(/[^a-z0-9]/gi,'-').toLowerCase();
  doc.save(fn+'-calendar.pdf');
}

/* ================================================================
   HELP VIEW PDF
   Full documentation, paginated
   ================================================================ */
function _pdfHelp(){
  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var margin = 16;
  var contentW = pageW - margin * 2;
  var y = 26;

  function ensureSpace(needed){
    if(y + needed > pageH - 14){
      doc.addPage();
      _pdfPageHeader(doc, 'Help & Documentation', 'RE Transaction Date Calculator', pageW);
      y = 26;
    }
  }

  function drawSection(title, bodyLines){
    ensureSpace(16);
    // Section header bar
    doc.setFillColor.apply(doc, PDF_COLORS.text);
    doc.rect(margin, y, contentW, 7, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(255,255,255);
    doc.text(title, margin + 3, y + 5);
    y += 9;

    bodyLines.forEach(function(line){
      if(line.type === 'p'){
        ensureSpace(6);
        doc.setFont('helvetica', line.bold ? 'bold' : 'normal');
        doc.setFontSize(8.5);
        doc.setTextColor.apply(doc, PDF_COLORS.text);
        var wrapped = doc.splitTextToSize(line.text, contentW - 2);
        wrapped.forEach(function(l){
          ensureSpace(5);
          doc.text(l, margin + 2, y);
          y += 4.5;
        });
        y += 1;
      } else if(line.type === 'bullet'){
        ensureSpace(5);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor.apply(doc, PDF_COLORS.subtext);
        doc.text('•', margin + 3, y);
        var wrapped = doc.splitTextToSize(line.text, contentW - 10);
        wrapped.forEach(function(l, li){
          ensureSpace(5);
          doc.text(l, margin + 7, y);
          y += 4.5;
        });
      } else if(line.type === 'table'){
        ensureSpace(20);
        doc.autoTable({
          head:[line.head],
          body:line.rows,
          startY:y,
          margin:{left:margin, right:margin},
          tableWidth:contentW,
          styles:{fontSize:7.5,cellPadding:{top:2,bottom:2,left:3,right:3},lineColor:PDF_COLORS.border,lineWidth:0.2},
          headStyles:{fillColor:PDF_COLORS.text,textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},
          alternateRowStyles:{fillColor:[248,250,252]},
          didDrawPage:function(data){
            _pdfPageHeader(doc,'Help & Documentation','RE Transaction Date Calculator',pageW);
          }
        });
        y = doc.lastAutoTable.finalY + 4;
      }
    });
    y += 3;
  }

  _pdfPageHeader(doc, 'Help & Documentation', 'RE Transaction Date Calculator', pageW);

  drawSection('Overview', [
    {type:'p', text:'The RE Transaction Date Calculator automatically computes all contract milestone dates from your Offer Date and Acceptance Date. Dates use configurable day offsets anchored to key transaction events, organized into six milestone groups each cross-referenced to the relevant contract section number.'},
    {type:'p', bold:true, text:'Business Day Rollover:'},
    {type:'p', text:'When a calculated date falls on a weekend or holiday, an Effective Date is shown. This is the next business day — what the contract performs to under Days language. The date field is flagged amber. The Closing Date is never auto-rolled; it shows red with "Business Day Required" as a prompt.'},
  ]);

  drawSection('Pro Tip — Get Started', [
    {type:'bullet', text:'Add the Property Address in the Property field at the top.'},
    {type:'bullet', text:'Pick a template (30, 45, or 60 Day Close) and customize offer dates. Each template sets Loan and Survey toggles automatically.'},
    {type:'bullet', text:'Save Transaction from the ⋯ menu to create a .json file you can reload at any time.'},
    {type:'bullet', text:'When offer is accepted: Load Transaction, update the Acceptance Date — all milestones recalculate instantly. Then Print or Export Calendar.'},
  ]);

  drawSection('Calculation Modes', [
    {type:'table',
      head:['Mode','Loan','New Survey','Closing'],
      rows:[
        ['30 Day Close','No (off)','No (off)','30 days from Acceptance'],
        ['45 Day Close','Yes (on)','No (off)','45 days from Acceptance'],
        ['60 Day Close','Yes (on)','Yes (on)','60 days from Acceptance'],
        ['My Preset','Yes (on)','Yes (on)','Configurable'],
        ['Custom','Yes (on)','Yes (on)','Spinner or banner input'],
      ]
    },
  ]);

  drawSection('Date & Day Overrides', [
    {type:'p', text:'Each milestone shows a Days spinner pre-filled with the preset offset. Changing it shifts the milestone for the current session only — the preset is not modified. Clearing the spinner restores the preset value.'},
    {type:'bullet', text:'Close-anchored fields (Repair Completion, Final Walkthrough, etc.) accept 0 or negative values only.'},
    {type:'bullet', text:'All other calculated fields accept 0 or positive values only.'},
    {type:'bullet', text:'0 days = same date as the anchor event.'},
    {type:'p', text:'The date picker in the Calculated Date column updates the spinner to reflect the computed offset from the anchor — both controls stay in sync. The ↺ reset button clears both.'},
  ]);

  drawSection('Skip & Loan / Survey Toggles', [
    {type:'p', text:'Fields with a Skip button can be excluded from printouts and calendar export. Active state turns red. Saved with the transaction.'},
    {type:'p', text:'The Loan: Yes/No pill in the Financials header suppresses Pre-qualification Letter, Loan Application, and Final Loan Approval. Session-only — resets to default on mode switch.'},
    {type:'p', text:'The Survey: Yes/No pill in the New Survey header ignores all four New Survey milestones. Saved with the transaction.'},
  ]);

  drawSection('Save & Load Transactions', [
    {type:'p', text:'Use Save Transaction (⋯ menu) to save the current transaction as a .json file. Use Load Transaction to restore it later on any machine.'},
    {type:'p', bold:true, text:'What is saved:'},
    {type:'bullet', text:'Property name, Offer Date, mode, Custom Closing Date'},
    {type:'bullet', text:'All date picker overrides, Skip states, Loan/Survey toggle, DD Resolution anchor, Existing Doc anchor'},
    {type:'p', bold:true, text:'What is NOT saved (session-only):'},
    {type:'bullet', text:'Days spinner overrides — use Save to My Preset to preserve them'},
    {type:'bullet', text:'Preset offsets and holiday list — use Export Settings'},
  ]);

  drawSection('Calendar Export', [
    {type:'p', text:'Downloads an .ics file of all visible, non-skipped milestones as all-day calendar events. Import into Google Calendar, Outlook, or Apple Calendar.'},
    {type:'p', text:'When a date was rolled forward, the calendar event description notes the original Calculated Date.'},
  ]);

  drawSection('Settings — Presets & Holidays', [
    {type:'p', text:'Open Settings → Presets to customize default day counts for the 30 Day, 45 Day, 60 Day, or My Preset templates. Changes save immediately to your browser.'},
    {type:'p', text:'Open Settings → Holidays to manage the holiday list for business day rollover. The default list includes 11 US federal holidays. Add custom holidays by month and day (repeating annually).'},
    {type:'p', text:'Use Export Settings / Import Settings in the Settings footer to share a configuration across a team or back up your customizations. Settings are stored in localStorage — export regularly.'},
  ]);

  // Add page numbers
  var totalPages = doc.internal.getNumberOfPages();
  for(var p = 1; p <= totalPages; p++){
    doc.setPage(p);
    _pdfPageFooter(doc, p, totalPages, pageW, pageH);
  }

  doc.save('re-transaction-calculator-help.pdf');
}

/* ================================================================
   TIMELINE PDF
   Swim lane chart — one lane per active group, dots tiered to
   avoid overlap, numbered legend below.
   ================================================================ */
function _pdfTimeline(){
  var computed = calc();
  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'letter' });
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var mg    = 14;
  var subtitle = _pdfSubtitle(computed);
  var loanSuppressed = !S.includeLoan;

  var td = _buildTimelineData(computed);
  if(!td){ alert('No dates to export.'); return; }

  // ── Build per-group milestone lists ──
  var groupItems = {};
  td.GROUP_META.forEach(function(g){ groupItems[g.id] = []; });
  var counter = 0;
  GROUPS.forEach(function(grp){
    var secIgnored = !!S.ignoredSections[grp.id];
    grp.keys.forEach(function(k){
      var fd = FD_MAP[k]; if(!fd) return;
      var isIgnored = secIgnored||(loanSuppressed&&!!fd.loan)||!!S.ignored[k];
      if(!fd.inputOnly&&!fd.isDefault) counter++;
      var num = counter;
      if(isIgnored) return;
      var date = computed.dates[k]; if(!date) return;
      var eff = computed.effective&&computed.effective[k];
      if(groupItems[grp.id])
        groupItems[grp.id].push({num:num,lbl:fd.lbl,key:k,date:date,
          effDate:(eff&&toYMD(eff)!==toYMD(date))?eff:null});
    });
  });

  var COLLISION_PCT = 3.5;
  function assignTiers(items){
    if(!items.length) return {items:items,tiers:1};
    var sorted = items.slice().sort(function(a,b){return a.date-b.date;});
    var tierEnds = [];
    sorted.forEach(function(item){
      var p = td.pct(item.date); var placed=false;
      for(var t=0;t<tierEnds.length;t++){
        if(p-tierEnds[t]>=COLLISION_PCT){ item.tier=t; tierEnds[t]=p; placed=true; break; }
      }
      if(!placed){ item.tier=tierEnds.length; tierEnds.push(p); }
    });
    return {items:items,tiers:tierEnds.length};
  }

  var labelW = 36;
  var trackX = mg + labelW + 3;
  var trackW = pageW - trackX - mg;
  var DOT_R  = 2.8;
  var TIER_H = 8;

  var activeGroups = td.GROUP_META.filter(function(g){
    return groupItems[g.id] && groupItems[g.id].length > 0;
  });

  var laneHeights = activeGroups.map(function(g){
    var r = assignTiers(groupItems[g.id]);
    return {meta:g, items:groupItems[g.id], tiers:r.tiers, laneH:r.tiers*TIER_H};
  });
  var totalLaneH = laneHeights.reduce(function(s,l){return s+l.laneH+2;},0);

  var startY = 26;
  // Reserve space: chart + axis labels + separator + legend header + legend rows
  // Legend: ~5mm per item, 3 columns. Estimate rows needed.
  var totalItems = activeGroups.reduce(function(s,g){ return s+(groupItems[g.id]||[]).length; },0);
  var lgRowH = 5;
  var lgCols = 3;
  var lgRowsNeeded = Math.ceil(totalItems / lgCols) + activeGroups.length; // items + group headers
  var lgH = lgRowsNeeded * lgRowH + 12; // +header row + separator
  var maxAvail = pageH - startY - 12 - lgH; // 12 = axis labels

  if(totalLaneH > maxAvail && maxAvail > 10){
    var scale = maxAvail / totalLaneH;
    TIER_H = Math.max(TIER_H * scale, 4);
    DOT_R  = Math.max(DOT_R * scale, 1.4);
    laneHeights.forEach(function(l){ l.laneH = l.tiers * TIER_H; });
    totalLaneH = laneHeights.reduce(function(s,l){return s+l.laneH+2;},0);
  }

  function tX(p){ return trackX + (p/100)*trackW; }

  _pdfPageHeader(doc, 'Transaction Story', subtitle, pageW);

  // ── Grid lines + urgency zones ──
  var gridTop = startY, gridBot = startY + totalLaneH;
  td.gridLines.forEach(function(gl){
    doc.setDrawColor.apply(doc, gl.isMonth?PDF_COLORS.border:[240,244,248]);
    doc.setLineWidth(gl.isMonth?0.25:0.1);
    doc.line(tX(gl.pct), gridTop, tX(gl.pct), gridBot);
  });
  td.urgencyZones.forEach(function(uz){
    var isRed = uz.color.indexOf('239')>=0;
    doc.setFillColor.apply(doc, isRed?[255,235,235]:[255,253,235]);
    doc.rect(tX(uz.left), gridTop, tX(uz.right)-tX(uz.left), totalLaneH, 'F');
  });

  // ── Anchor labels above chart ──
  var anchorColors = {Offer:[29,78,216], Acceptance:[13,148,136], Closing:[185,28,28]};
  td.anchors.forEach(function(a){
    var ax = tX(a.pct);
    var rgb = anchorColors[a.lbl] || PDF_COLORS.text;
    doc.setFillColor.apply(doc, rgb);
    doc.setFont('helvetica','bold'); doc.setFontSize(5.5);
    doc.setTextColor(255,255,255);
    var tw = doc.getTextWidth(a.lbl) + 4;
    doc.roundedRect(ax-tw/2, startY-6, tw, 5, 1, 1, 'F');
    doc.text(a.lbl, ax, startY-2.8, {align:'center'});
    // Drop line
    doc.setDrawColor.apply(doc, rgb);
    doc.setLineWidth(0.3);
    doc.line(ax, startY-1, ax, gridBot);
  });

  // ── Swim lanes ──
  var curY = startY;
  laneHeights.forEach(function(lane){
    var meta = lane.meta;
    var laneH = lane.laneH;

    // Axis lines per tier
    for(var t=0; t<lane.tiers; t++){
      var ay = curY + t*TIER_H + TIER_H/2;
      doc.setDrawColor.apply(doc, t===0?PDF_COLORS.border:[240,244,248]);
      doc.setLineWidth(t===0?0.4:0.15);
      doc.line(trackX, ay, pageW-mg, ay);
    }

    // Label pill centred on lane
    var pillCy = curY + laneH/2;
    doc.setFillColor.apply(doc, meta.rgb);
    doc.roundedRect(mg, pillCy-3.5, labelW-2, 7, 1.5, 1.5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(6);
    doc.setTextColor(255,255,255);
    doc.text(meta.lbl, mg+(labelW-2)/2, pillCy+1.1, {align:'center'});

    // Dots — fix badge centering: baseline offset = DOT_R * 0.35 (empirical for Helvetica)
    lane.items.forEach(function(item){
      var p  = td.pct(item.date);
      var t  = item.tier || 0;
      var dy = curY + t*TIER_H + TIER_H/2;
      var dx = tX(p);
      var baselineOff = DOT_R * 0.35; // visually centres cap-height text in circle

      doc.setFillColor.apply(doc, meta.rgb);
      doc.circle(dx, dy, DOT_R, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(DOT_R*1.4);
      doc.setTextColor(255,255,255);
      doc.text(String(item.num), dx, dy+baselineOff, {align:'center'});

      if(item.effDate){
        var ex = tX(td.pct(item.effDate));
        doc.setFillColor(255,255,255);
        doc.setDrawColor.apply(doc, meta.rgb);
        doc.setLineWidth(0.3);
        doc.circle(ex, dy, DOT_R, 'FD');
        doc.setFont('helvetica','bold'); doc.setFontSize(DOT_R*1.4);
        doc.setTextColor.apply(doc, meta.rgb);
        doc.text(String(item.num), ex, dy+baselineOff, {align:'center'});
      }
    });

    curY += laneH + 2;
  });

  // ── Axis tick labels ──
  var axisLblY = curY + 5;
  td.gridLines.forEach(function(gl){
    if(gl.isMonth||td.useWeeks){
      doc.setFont('helvetica',gl.isMonth?'bold':'normal');
      doc.setFontSize(5.5);
      doc.setTextColor.apply(doc, gl.isMonth?PDF_COLORS.subtext:PDF_COLORS.muted);
      doc.text(gl.label, tX(gl.pct), axisLblY, {align:'center'});
    }
  });

  // ── Legend — use autoTable for clean layout, ASCII-safe labels ──
  var lgStartY = axisLblY + 6;
  // Build legend rows for autoTable: [dot-num, name, date]
  var lgBody = [];
  activeGroups.forEach(function(meta){
    var items2 = groupItems[meta.id]; if(!items2||!items2.length) return;
    // Section header row
    lgBody.push([{
      content: meta.lbl.toUpperCase(),
      colSpan: 3,
      styles:{ fillColor:meta.rgb, textColor:[255,255,255], fontStyle:'bold',
               fontSize:6, cellPadding:{top:2,bottom:2,left:3,right:3} }
    }]);
    items2.forEach(function(item){
      var dateStr = _pdfFmtShort(item.date);
      // ASCII-safe: no Unicode arrows or ellipsis
      var effStr  = item.effDate ? (' -> '+_pdfFmtShort(item.effDate)) : '';
      // Truncate name cleanly — no Unicode ellipsis
      var shortLbl = item.lbl.replace(/ (\d+\..*?)$/,'').trim();
      lgBody.push([
        { content:String(item.num),
          styles:{ halign:'center', fontStyle:'bold', textColor:meta.rgb, fontSize:6.5 } },
        { content:shortLbl,
          styles:{ fontSize:6.5, textColor:PDF_COLORS.text } },
        { content:dateStr+effStr,
          styles:{ fontSize:6, textColor:PDF_COLORS.subtext, halign:'right' } }
      ]);
    });
  });

  // Split into 3 equal-width columns using autoTable's columnStyles
  var colW = (pageW - mg*2) / 3;
  // We'll just do a single-table approach spanning full width —
  // autoTable handles pagination cleanly
  doc.autoTable({
    body: lgBody,
    startY: lgStartY,
    // margin.top must clear the page header (20mm header + 5mm gap = 25mm)
    margin: { left:mg, right:mg, top:26 },
    tableWidth: pageW - mg*2,
    styles:{ font:'helvetica', fontSize:6.5, cellPadding:{top:2.5,bottom:2.5,left:4,right:4},
             overflow:'linebreak', lineColor:PDF_COLORS.border, lineWidth:0.15 },
    headStyles:{ fillColor:PDF_COLORS.text, textColor:[255,255,255] },
    alternateRowStyles:{ fillColor:[248,250,252] },
    columnStyles:{
      0: { cellWidth:14, halign:'center' },
      1: { cellWidth:'auto' },
      2: { cellWidth:42, halign:'right' }
    },
    didDrawPage: function(data){
      _pdfPageHeader(doc, 'Transaction Story', subtitle, pageW);
    }
  });

  // Stamp page footers
  var totalPages = doc.internal.getNumberOfPages();
  for(var p=1; p<=totalPages; p++){
    doc.setPage(p);
    _pdfPageFooter(doc, p, totalPages, pageW, pageH);
  }

  var fn=(S.propertyName||'transaction').replace(/[^a-z0-9]/gi,'-').toLowerCase();
  doc.save(fn+'-timeline.pdf');
}



/* ================================================================
   ENTRY POINT — called by Print button
   Dispatches to the correct PDF function based on active view
   ================================================================ */
function generatePDF(){
  if(typeof window.jspdf === 'undefined'){
    alert('PDF library not loaded. Please check your internet connection and try again.');
    return;
  }
  var view = _calView || 'detail';
  if(view === 'detail')        _pdfDetail();
  else if(view === 'calendar') _pdfCalendar();
  else if(view === 'timeline') _pdfTimeline();
  else if(view === 'help')     _pdfHelp();
}


/* ============================================================
   INIT
   Loads persisted settings, sets today as the default offer date,
   performs initial render, and attaches the click-outside handler
   for the ⋯ more menu.
   ============================================================ */
S.settings=loadSettings();
S.offerDate=toYMD(new Date());
// Apply 30 Day Close defaults on initial load
S.ignored={icActual:true};
S.includeLoan=false;
S.ignoredSections={newsurvey:true};
render();

// Close ⋯ menu when clicking outside it
document.addEventListener('click', function(e){
  var btn=document.getElementById('moreMenuBtn');
  if(btn && !btn.contains(e.target)){
    document.getElementById('moreMenu').classList.remove('open');
  }
});

// Handle Ctrl/Cmd+P — tag body with current view for print CSS
window.addEventListener('beforeprint', function(){
  document.body.setAttribute('data-print-view', _calView||'detail');
});
window.addEventListener('afterprint', function(){
  document.body.removeAttribute('data-print-view');
});

})();
